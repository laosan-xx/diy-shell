name: NodeSeek 签到

on:
  # 定时触发：每天 UTC 00:00 和 12:00（北京时间 08:00 和 20:00）
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r nodeseek-signin/requirements.txt

      - name: 执行签到
        env:
          NS_RANDOM: ${{ vars.NS_RANDOM }}
          NS_DELAY: ${{ vars.NS_DELAY }}
          NS_HEADLESS: ${{ vars.NS_HEADLESS }}
          NS_PROXY: ${{ secrets.NS_PROXY }}
          NS_COOKIE: ${{ secrets.NS_COOKIE }}
          NS_USERNAME: ${{ secrets.NS_USERNAME }}
          NS_PASSWORD: ${{ secrets.NS_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_API_URL: ${{ secrets.TG_API_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${NS_HEADLESS}" = "false" ]; then
            sudo apt-get install -y xvfb
            xvfb-run python nodeseek-signin/nodeseek_sign.py
          else
            python nodeseek-signin/nodeseek_sign.py
          fi
