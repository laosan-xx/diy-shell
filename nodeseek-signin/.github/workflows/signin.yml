name: NodeSeek 签到

on:
  # 定时触发：每天 UTC 00:00 和 12:00（北京时间 08:00 和 20:00）
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装 patchright 浏览器（用于账号密码登录时求解 Turnstile）
          python -m patchright install chromium
          # 安装 patchright 浏览器系统依赖
          sudo apt-get update && sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: 执行签到
        env:
          # ===== 签到配置 =====
          # 签到模式：true=随机签到(1~N鸡腿), false=固定签到(鸡腿x5)
          NS_RANDOM: ${{ vars.NS_RANDOM }}
          # 随机延迟范围（秒），格式 "最小-最大"，留空则使用默认 0-300
          NS_DELAY: ${{ vars.NS_DELAY }}
          # 浏览器 headless 模式：true=无头模式, false=有头模式（需 xvfb）
          NS_HEADLESS: ${{ vars.NS_HEADLESS }}

          # ===== 登录方式一：Cookie（推荐）=====
          # 多账号用 & 分隔
          NS_COOKIE: ${{ secrets.NS_COOKIE }}

          # ===== 登录方式二：账号密码 =====
          # 多账号用 & 分隔
          NS_USERNAME: ${{ secrets.NS_USERNAME }}
          NS_PASSWORD: ${{ secrets.NS_PASSWORD }}

          # ===== Telegram 通知（可选）=====
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # TG API 地址（可选，用于反代）
          TG_API_URL: ${{ secrets.TG_API_URL }}

          # ===== GitHub 变量自动更新（可选）=====
          # 需要 repo 权限的 PAT
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: 执行签到脚本
        run: |
          # 如果 NS_HEADLESS=false，使用 xvfb 虚拟显示运行有头浏览器
          if [ "${NS_HEADLESS}" = "false" ]; then
            sudo apt-get install -y xvfb
            xvfb-run python nodeseek_sign.py
          else
            python nodeseek_sign.py
          fi
